<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
        <title>PlayCanvas Web Components - UI Scroll View</title>
        <script type="importmap">
            {
                "imports": {
                    "playcanvas": "../node_modules/playcanvas/build/playcanvas.mjs"
                }
            }
        </script>
        <script type="module" src="../dist/pwc.mjs"></script>
        <link rel="stylesheet" href="css/example.css">
    </head>
    <body>
        <pc-app>
            <!-- Assets -->
            <!-- Texture atlas (the atlas must be declared before the sprites that reference it). -->
            <pc-asset id="ui-sheet" type="textureatlas" src="assets/textures/ui-spritesheet.png" data='{"addressu":"repeat","addressv":"repeat","minfilter":"linear_mip_linear","magfilter":"linear","anisotropy":1,"rgbm":false,"mipmaps":true,"srgb":true,"frames":{"0":{"name":"blue_button03","border":[0,0,0,0],"rect":[1,150,190,45],"pivot":[0.5,0.5]},"1":{"name":"green_button03","border":[0,0,0,0],"rect":[1,103,190,45],"pivot":[0.5,0.5]},"2":{"name":"grey_boxCross","border":[0,0,0,0],"rect":[1,65,38,36],"pivot":[0.5,0.5]},"3":{"name":"grey_panel","border":[10,10,10,10],"rect":[41,1,100,100],"pivot":[0.5,0.5]},"5":{"name":"yellow_button03","border":[0,0,0,0],"rect":[193,103,190,45],"pivot":[0.5,0.5]}}}'></pc-asset>
            <!-- Sprites -->
            <pc-asset id="blue-button" type="sprite" atlas="ui-sheet" frame-keys="0" pixels-per-unit="100"></pc-asset>
            <pc-asset id="green-button" type="sprite" atlas="ui-sheet" frame-keys="1" pixels-per-unit="100"></pc-asset>
            <pc-asset id="grey-cross" type="sprite" atlas="ui-sheet" frame-keys="2" pixels-per-unit="100"></pc-asset>
            <pc-asset id="grey-panel" type="sprite" atlas="ui-sheet" frame-keys="3" pixels-per-unit="1" render-mode="sliced"></pc-asset>
            <pc-asset id="yellow-button" type="sprite" atlas="ui-sheet" frame-keys="5" pixels-per-unit="100"></pc-asset>
            <!-- Font -->
            <pc-asset id="kenney" type="font" src="assets/fonts/kenney-future.json"></pc-asset>
            <!-- Script -->
            <pc-asset src="assets/scripts/scroll-view.mjs"></pc-asset>

            <!-- Scene -->
            <pc-scene>
                <!-- Camera -->
                <pc-entity name="camera" position="4 3.5 4" rotation="-30 45 0">
                    <pc-camera clear-color="0.204 0.286 0.369"></pc-camera>
                </pc-entity>

                <!-- 2D screen-space UI -->
                <pc-entity name="2D Screen">
                    <pc-screen screen-space blend scale-blend="1" resolution="1280 720" reference-resolution="1280 720"></pc-screen>

                    <!-- Scroll view -->
                    <pc-entity name="ScrollView">
                        <pc-element type="group" anchor="0.5 0.5 0.5 0.5" pivot="0.5 0.5" width="230" height="400"></pc-element>
                        <pc-scrollview
                            horizontal="false"
                            vertical="true"
                            scroll-mode="bounce"
                            bounce-amount="0.1"
                            friction="0.05"
                            vertical-scrollbar-visibility="when-required"
                            viewport="#viewport"
                            content="#scroll-content"
                            vertical-scrollbar="#vertical-scrollbar"></pc-scrollview>
                        <pc-scripts>
                            <pc-script name="scrollView"></pc-script>
                        </pc-scripts>

                        <!-- Background panel (9-sliced) -->
                        <pc-entity name="Background">
                            <pc-element type="image" anchor="0 0 1 1" pivot="0.5 0.5" margin="0 0 20 0" sprite-asset="grey-panel"></pc-element>
                        </pc-entity>

                        <!-- Viewport (masks the content) -->
                        <pc-entity name="Viewport" id="viewport">
                            <pc-element type="image" anchor="0 0 1 1" pivot="0 1" margin="0 0 20 0" color="0.2 0.2 0.2" mask></pc-element>

                            <!-- Content (laid out vertically, grown to fit by a script) -->
                            <pc-entity name="Content" id="scroll-content">
                                <pc-element type="group" anchor="0 1 0 1" pivot="0 1" width="220" height="700" use-input></pc-element>
                                <pc-layoutgroup orientation="vertical" reverse-y alignment="0 1" padding="10 10 10 10" spacing="0 5"></pc-layoutgroup>
                            </pc-entity>
                        </pc-entity>

                        <!-- Vertical scrollbar -->
                        <pc-entity name="VerticalScrollbar" id="vertical-scrollbar" position="4.536 400 0">
                            <pc-element type="image" anchor="1 0 1 1" pivot="1 1" width="20" margin="-15.464 0 -4.536 0" color="0.5 0.5 0.5" sprite-asset="grey-panel"></pc-element>
                            <pc-scrollbar orientation="vertical" value="0" handle-size="0.5" handle="#scroll-handle"></pc-scrollbar>

                            <!-- Draggable handle -->
                            <pc-entity name="Handle" id="scroll-handle">
                                <pc-element type="image" anchor="0 1 1 1" pivot="1 1" height="32" margin="0 0 0 0" sprite-asset="grey-panel" use-input></pc-element>
                                <pc-button></pc-button>
                            </pc-entity>
                        </pc-entity>
                    </pc-entity>

                    <!-- Add entry button -->
                    <pc-entity name="Add Entry Button" position="-10.094 231.047 0">
                        <pc-element type="group" anchor="0.5 0.5 0.5 0.5" pivot="0.5 0.5" width="190" height="45" use-input></pc-element>
                        <pc-button image="#add-entry-bg" transition-mode="tint" hover-tint="0.82 0.82 0.82 1" pressed-tint="0.361 0.361 0.361 1"></pc-button>

                        <pc-entity name="Background" id="add-entry-bg">
                            <pc-element type="image" anchor="0 1 0 1" pivot="0 1" width="190" height="45" sprite-asset="blue-button"></pc-element>

                            <pc-entity name="Text">
                                <pc-element type="text" anchor="0.1 0.1 0.9 0.9" pivot="0.5 0.5" margin="0 0 0 0" asset="kenney" font-size="32" min-font-size="8" max-font-size="32" auto-fit-width auto-fit-height auto-width="false" color="1 1 1" text="Add entry"></pc-element>
                            </pc-entity>
                        </pc-entity>
                    </pc-entity>
                </pc-entity>
            </pc-scene>
        </pc-app>

        <!-- Entry templates. Cloned at runtime by the scroll controller. -->
        <template class="entry" id="entry-blue">
            <pc-entity name="Entry">
                <pc-element type="group" anchor="0 1 0 1" pivot="0 1" width="190" height="45"></pc-element>
                <pc-layoutchild></pc-layoutchild>
                <pc-entity name="Background">
                    <pc-element type="image" anchor="0 1 0 1" pivot="0 1" width="190" height="45" sprite-asset="blue-button"></pc-element>
                </pc-entity>
                <pc-entity name="Remove Button" position="-3.976 0 0">
                    <pc-element type="image" anchor="1 0.5 1 0.5" pivot="1 0.5" width="38" height="36" sprite-asset="grey-cross" use-input></pc-element>
                    <pc-button transition-mode="tint" hover-tint="0.82 0.82 0.82 1" pressed-tint="0.361 0.361 0.361 1"></pc-button>
                </pc-entity>
                <pc-entity name="Text" position="12.888 0 0">
                    <pc-element type="text" anchor="0 0.5 0 0.5" pivot="0 0.5" asset="kenney" font-size="32" color="1 1 1" text="1"></pc-element>
                </pc-entity>
            </pc-entity>
        </template>

        <template class="entry" id="entry-green">
            <pc-entity name="Entry">
                <pc-element type="group" anchor="0 1 0 1" pivot="0 1" width="190" height="45"></pc-element>
                <pc-layoutchild></pc-layoutchild>
                <pc-entity name="Background">
                    <pc-element type="image" anchor="0 1 0 1" pivot="0 1" width="190" height="45" sprite-asset="green-button"></pc-element>
                </pc-entity>
                <pc-entity name="Remove Button" position="-3.976 0 0">
                    <pc-element type="image" anchor="1 0.5 1 0.5" pivot="1 0.5" width="38" height="36" sprite-asset="grey-cross" use-input></pc-element>
                    <pc-button transition-mode="tint" hover-tint="0.82 0.82 0.82 1" pressed-tint="0.361 0.361 0.361 1"></pc-button>
                </pc-entity>
                <pc-entity name="Text" position="12.888 0 0">
                    <pc-element type="text" anchor="0 0.5 0 0.5" pivot="0 0.5" asset="kenney" font-size="32" color="1 1 1" text="1"></pc-element>
                </pc-entity>
            </pc-entity>
        </template>

        <template class="entry" id="entry-yellow">
            <pc-entity name="Entry">
                <pc-element type="group" anchor="0 1 0 1" pivot="0 1" width="190" height="45"></pc-element>
                <pc-layoutchild></pc-layoutchild>
                <pc-entity name="Background">
                    <pc-element type="image" anchor="0 1 0 1" pivot="0 1" width="190" height="45" sprite-asset="yellow-button"></pc-element>
                </pc-entity>
                <pc-entity name="Remove Button" position="-3.976 0 0">
                    <pc-element type="image" anchor="1 0.5 1 0.5" pivot="1 0.5" width="38" height="36" sprite-asset="grey-cross" use-input></pc-element>
                    <pc-button transition-mode="tint" hover-tint="0.82 0.82 0.82 1" pressed-tint="0.361 0.361 0.361 1"></pc-button>
                </pc-entity>
                <pc-entity name="Text" position="12.888 0 0">
                    <pc-element type="text" anchor="0 0.5 0 0.5" pivot="0 0.5" asset="kenney" font-size="32" color="1 1 1" text="1"></pc-element>
                </pc-entity>
            </pc-entity>
        </template>

        <script type="module" src="js/example.mjs"></script>
    </body>
</html>
