<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
        <title>PlayCanvas Web Components Examples</title>

        <!-- Favicon -->
        <link rel="icon" type="image/png" href="img/playcanvas.png">
        <link rel="apple-touch-icon" href="img/playcanvas.png">

        <!-- SEO -->
        <meta name="description" content="Examples showcasing PlayCanvas Web Components capabilities and features">
        <meta name="keywords" content="3D, AR, Custom Elements, glTF, HTML, PlayCanvas, VR, Web Components, WebGL, WebGPU, WebXR">
        <meta name="author" content="PlayCanvas">

        <!-- Open Graph / Social Media -->
        <meta property="og:title" content="PlayCanvas Web Components - Examples">
        <meta property="og:description" content="Examples showcasing PlayCanvas Web Components capabilities and features">
        <meta property="og:image" content="img/playcanvas.png">
        <meta property="og:type" content="website">

        <!-- Theme Color for Mobile Browsers -->
        <meta name="theme-color" content="#1a1a1a">

        <!-- PWA -->
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
        <meta name="apple-mobile-web-app-title" content="PlayCanvas Examples">
        <link rel="manifest" href="manifest.json">

        <link rel="stylesheet" href="css/browser.css">
        <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    </head>
    <body>
        <aside class="sidebar">
            <header class="header">
                <img src="img/playcanvas.png" alt="PlayCanvas Logo" class="logo">
                <h2>PlayCanvas<br>Web Components</h2>
                <a class="github-link" href="https://github.com/playcanvas/web-components" target="_blank" rel="noopener" aria-label="View on GitHub">
                    <svg width="20" height="20" viewBox="0 0 16 16" aria-hidden="true">

                </a>
            </header>
            <div class="search">
                <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
                    <circle cx="11" cy="11" r="8"/>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <input type="search" id="search-input" placeholder="Search examples" autocomplete="off" spellcheck="false" aria-label="Search examples">
            </div>
            <nav id="example-list" aria-label="Examples"></nav>
        </aside>
        <main class="main">
            <iframe id="example-frame" allow="fullscreen; xr-spatial-tracking;"></iframe>
        </main>

        <button class="menu-toggle" aria-label="Toggle Menu">
            <svg width="24" height="24" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z" fill="currentColor"/>
            </svg>
        </button>
        <div class="sidebar-overlay" role="presentation"></div>

        <dialog id="qr-modal">
            <div class="qr-modal-content">
                <div id="qr-code"></div>
                <p>Scan to view on mobile</p>
            </div>
        </dialog>

        <script type="module" src="js/browser.mjs"></script>
    </body>
</html>
